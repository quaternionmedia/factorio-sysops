[technology-description]
it-basics=Enables basic IT infrastructure: sensors to collect data, cables to transport it, servers to process it, circuit bridges to integrate with automation, and dashboards to monitor it all.
it-automation=Unlocks Advanced Server with 2× processing speed. Enables sophisticated automation of IT infrastructure via circuit signals.
it-advanced=Unlocks High-Performance Server with 4× processing speed. Maximum data processing capability for large-scale operations.

