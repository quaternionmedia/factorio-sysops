[item-description]
data-packet=A bundle of operational data collected from factory machines. Transport to servers for processing.
data-sensor=Place near assembling machines to collect operational data. Connect to circuit network to control monitored machines via IT Control signal.
network-cable=High-speed data conduit. Auto-transfers data packets to/from adjacent entities.
network-cable-underground=Underground data conduit for routing cables through obstacles.
network-cable-splitter=Splits or merges data packet streams for load balancing.
basic-server=Processes data packets. Add more servers to handle higher data throughput.
advanced-server=Faster data processing at 2× speed. Consumes 400kW power.
hp-server=Maximum data processing at 4× speed. Consumes 800kW power.
circuit-bridge=Bridges IT metrics to the circuit network.
dashboard-terminal=Displays IT metrics and system status.

