[entity-description]
data-sensor=Collects operational data from nearby assembling machines. Connect to a server via network cables for processing. Circuit-connectable: send IT Control signal to enable (>0) or disable (<0) monitored machines. Outputs per-sensor metrics: ID, entities monitored, backlog, and data rate.
sensor-circuit-interface=Internal circuit interface for per-sensor signal output. Outputs: Sensor ID, monitored entities count, backlog, and data rate.
network-cable=High-speed data conduit. Transports data packets from sensors to servers at maximum speed.
network-cable-underground=Underground data conduit. Connects network cables through walls and obstacles.
network-cable-splitter=Splits or merges data packet streams. Use for load balancing or data routing.
basic-server=Processes data packets collected by sensors. Keep backlog low by adding more servers as needed.
advanced-server=High-capacity server with 2× processing speed. Requires 400kW power. Upgrade from basic server.
hp-server=Maximum performance server with 4× processing speed. Requires 800kW power. Top-tier data processing.
circuit-bridge=Outputs IT metrics to the circuit network and reads emergency stop/resume signals (signal-red/signal-green).
dashboard-terminal=Click to view IT infrastructure metrics and system status.

